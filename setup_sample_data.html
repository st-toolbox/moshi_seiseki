<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<title>サンプルデータ投入</title>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
<style>
body{font-family:sans-serif;max-width:600px;margin:40px auto;padding:20px;background:#f5f5f5;}
h1{font-size:20px;margin-bottom:20px;}
button{padding:12px 24px;background:#1A5CE8;color:#fff;border:none;border-radius:8px;font-size:15px;cursor:pointer;margin:8px 4px;}
button:hover{opacity:.85;}
button.danger{background:#B91C1C;}
#log{margin-top:20px;background:#fff;border:1px solid #ddd;border-radius:8px;padding:16px;font-size:13px;line-height:1.8;white-space:pre-wrap;max-height:400px;overflow-y:auto;}
.ok{color:green;} .err{color:red;} .info{color:#555;}
</style>
</head>
<body>
<h1>🔧 Firebaseサンプルデータ投入ツール</h1>
<p style="font-size:13px;color:#666;margin-bottom:20px;">このツールはFirebaseにサンプルデータを投入します。教員アカウントでログインしてから実行してください。</p>

<button onclick="signIn()">Googleでログイン</button>
<button onclick="runSetup()">サンプルデータを投入</button>
<button class="danger" onclick="clearAll()">全データを削除</button>

<div id="log">ログ待機中...</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyB8iFqfh0LV9iJEY4l3BbP92hVKxNNvWko",
  authDomain: "moshi-bunseki.firebaseapp.com",
  databaseURL: "https://moshi-bunseki-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "moshi-bunseki",
  storageBucket: "moshi-bunseki.firebasestorage.app",
  messagingSenderId: "324983246776",
  appId: "1:324983246776:web:d9fa55f11950ec1f90494d"
};
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db   = firebase.database();

function log(msg, cls='info') {
  const el = document.getElementById('log');
  el.innerHTML += `<span class="${cls}">${msg}</span>\n`;
  el.scrollTop = el.scrollHeight;
}

function signIn() {
  const provider = new firebase.auth.GoogleAuthProvider();
  auth.signInWithPopup(provider).then(r => {
    log(`✅ ログイン成功: ${r.user.email}`, 'ok');
  }).catch(e => log(`❌ ログインエラー: ${e.message}`, 'err'));
}

auth.onAuthStateChanged(user => {
  if (user) log(`ℹ️ ログイン済み: ${user.email}`);
});

async function runSetup() {
  const user = auth.currentUser;
  if (!user) { log('❌ 先にログインしてください', 'err'); return; }

  log('=== サンプルデータ投入開始 ===');

  // カテゴリ定義
  const categoriesAM = ["医学総論","解剖学","生理学","病理学","内科学","小児科学","精神医学","リハビリ医学","耳鼻咽喉科学","臨床神経学","形成外科","発声発語系医学","聴覚系医学","言語学","言語発達学","失語症","音声学","社会福祉・教育","臨床実習","医学総論"];
  const categoriesPM = ["失語症","高次脳機能障害","言語発達障害","音声障害","機能性構音障害","器質性構音障害","運動障害性構音障害","摂食・嚥下障害","吃音障害","聴覚障害","聴覚検査","補聴器・人工内耳","言語聴覚障害概論","失語症","高次脳機能障害","言語発達障害","音声障害","機能性構音障害","器質性構音障害","摂食・嚥下障害"];
  const getCat = q => q <= 100 ? categoriesAM[(q-1)%categoriesAM.length] : categoriesPM[(q-101)%categoriesPM.length];

  // 正答生成（シード固定）
  function seededRandom(seed) {
    let s = seed;
    return () => { s = (s * 1664525 + 1013904223) & 0xffffffff; return (s >>> 0) / 0xffffffff; };
  }
  const rand42 = seededRandom(42);
  const correctAnswers = Array.from({length:200}, () => Math.floor(rand42()*5)+1);

  // 正答・カテゴリオブジェクト
  const answers = {}, categories = {};
  for (let q=1; q<=200; q++) { answers[q] = correctAnswers[q-1]; categories[q] = getCat(q); }

  // 模試マスタ投入（2模試）
  const exams = [
    { name: '国試塾_2023_2回目', date: '2026/01/10', active: false },
    { name: '国試塾_2025_1回目', date: '2026/04/20', active: true },
  ];

  for (const e of exams) {
    await db.ref('exams/' + e.name).set({ date: e.date, active: e.active, answers, categories });
    log(`✅ 模試マスタ投入: ${e.name}`, 'ok');
  }

  // 学生データ
  const students = [
    {email:'oe222112@oky.asahi.ac.jp', name:'A'},
    {email:'oe222117@oky.asahi.ac.jp', name:'B'},
    {email:'oe223101@oky.asahi.ac.jp', name:'C'},
    {email:'oe223105@oky.asahi.ac.jp', name:'D'},
    {email:'oe223106@oky.asahi.ac.jp', name:'E'},
    {email:'oe223107@oky.asahi.ac.jp', name:'F'},
    {email:'oe223110@oky.asahi.ac.jp', name:'G'},
    {email:'oe223111@oky.asahi.ac.jp', name:'H'},
    {email:'oe223112@oky.asahi.ac.jp', name:'I'},
    {email:'oe223115@oky.asahi.ac.jp', name:'J'},
    {email:'oe223117@oky.asahi.ac.jp', name:'K'},
    {email:'oe223118@oky.asahi.ac.jp', name:'L'},
    {email:'oe223119@oky.asahi.ac.jp', name:'M'},
    {email:'oe223120@oky.asahi.ac.jp', name:'N'},
    {email:'oe223121@oky.asahi.ac.jp', name:'O'},
    {email:'oe223124@oky.asahi.ac.jp', name:'P'},
    {email:'nakanishi@asahi.ac.jp',    name:'QQ'},
  ];
  const abilities = [0.55,0.60,0.72,0.65,0.78,0.58,0.63,0.70,0.68,0.75,0.52,0.80,0.67,0.73,0.61,0.69,0.82];

  // 回答データ生成・投入（2模試分）
  for (const exam of exams) {
    const rand123 = seededRandom(123 + exams.indexOf(exam) * 1000);
    for (let si=0; si<students.length; si++) {
      const s = students[si];
      const ability = abilities[si];
      // fake UID（メールアドレスから生成）
      const uid = 'fake_' + s.email.replace(/[@.]/g,'_');

      // 学生登録
      await db.ref('students/' + uid).set({ email: s.email, name: s.name, registeredAt: Date.now() });

      for (const [part, start, end] of [['AM',1,100],['PM',101,200]]) {
        const ans = {};
        for (let q=start; q<=end; q++) {
          if (rand123() < ability) ans[q] = correctAnswers[q-1];
          else {
            let w = Math.floor(rand123()*5)+1;
            while (w === correctAnswers[q-1]) w = Math.floor(rand123()*5)+1;
            ans[q] = w;
          }
        }
        // 採点
        let score = 0;
        const catStats = {}, wrongList = [];
        for (let q=start; q<=end; q++) {
          const cat = getCat(q);
          if (!catStats[cat]) catStats[cat] = {correct:0,total:0};
          catStats[cat].total++;
          if (ans[q] === correctAnswers[q-1]) { score++; catStats[cat].correct++; }
          else wrongList.push({qNum:String(q),userAns:String(ans[q]),correctAns:String(correctAnswers[q-1]),category:cat});
        }
        await db.ref(`responses/${exam.name}/${uid}/${part}`).set({
          answers: ans, status: 'submitted', score,
          email: s.email, categoryScores: catStats, wrongAnswers: wrongList,
          submittedAt: Date.now()
        });
      }
      log(`✅ 回答データ投入: ${exam.name} / ${s.name}`, 'ok');
    }
  }

  // 教員登録（現在のユーザー）
  await db.ref('teachers/' + user.uid).set(true);
  log(`✅ 教員登録: ${user.email}`, 'ok');

  log('=== 完了！analysis_firebase.htmlをリロードしてください ===', 'ok');
}

async function clearAll() {
  if (!confirm('全データを削除しますか？')) return;
  const user = auth.currentUser;
  if (!user) { log('❌ 先にログインしてください', 'err'); return; }
  await db.ref('/').set(null);
  log('🗑 全データを削除しました', 'err');
}
</script>
</body>
</html>
